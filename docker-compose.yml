services:
  cp2:
    build: .
    container_name: bank-marketing-cp2
    command: python src/train_cp2.py
    volumes:
      - .:/app

  api:
    build: .
    container_name: bank-marketing-api
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
